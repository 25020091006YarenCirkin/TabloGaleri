<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Tablo Galerisi - Giriş</title>
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
    <style>
    /* Toz Pembe Login/Register Teması */
    .bg-gradient-primary {
        background-color: #fbcce7 !important;
        background-image: linear-gradient(180deg, #fbcce7 10%, #f8a5d1 100%) !important;
    }
    .btn-primary {
        background-color: #f8a5d1 !important;
        border-color: #f8a5d1 !important;
        transition: 0.3s;
    }
    .btn-primary:hover {
        background-color: #f089c0 !important;
        border-color: #f089c0 !important;
        transform: translateY(-1px);
    }
    .text-primary { color: #f089c0 !important; }
    
    /* Kart içindeki linklerin rengi */
    .small.text-primary { font-weight: bold; }
    
    /* Giriş kutusunun daha yumuşak görünmesi için */
    .card { border-radius: 15px !important; }
</style>
</head>
<body class="bg-gradient-primary">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-xl-10 col-lg-12 col-md-9">
                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <div class="row">
                            <div class="col-lg-6 d-none d-lg-block bg-login-image" style="background: url('https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=500') center; background-size: cover;"></div>
                            <div class="col-lg-6">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h1 class="h4 text-gray-900 mb-4 font-weight-bold">Sanat Galerisine Hoş Geldiniz!</h1>
                                    </div>
                                    <form class="user">
                                        <div class="form-group">
                                            <input type="email" class="form-control form-control-user" placeholder="E-posta Adresiniz...">
                                        </div>
                                        <div class="form-group">
                                            <input type="password" class="form-control form-control-user" placeholder="Şifre">
                                        </div>
                                        <a href="index.html" class="btn btn-primary btn-user btn-block">Giriş Yap</a>
                                    </form>
                                    <hr>
                                    <div class="text-center">
                                        <a class="small text-primary" href="register.html">Yeni bir hesap oluştur!</a>
                                    </div>
                                    <div class="text-center">
                                        <a class="small text-secondary" href="index.html">← Mağazaya Geri Dön</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
