<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Tablo Galerisi - Kayıt Ol</title>
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
   <style>
    /* Toz Pembe Login/Register Teması */
    .bg-gradient-primary {
        background-color: #fbcce7 !important;
        background-image: linear-gradient(180deg, #fbcce7 10%, #f8a5d1 100%) !important;
    }
    .btn-primary {
        background-color: #f8a5d1 !important;
        border-color: #f8a5d1 !important;
        transition: 0.3s;
    }
    .btn-primary:hover {
        background-color: #f089c0 !important;
        border-color: #f089c0 !important;
        transform: translateY(-1px);
    }
    .text-primary { color: #f089c0 !important; }
    
    /* Kart içindeki linklerin rengi */
    .small.text-primary { font-weight: bold; }
    
    /* Giriş kutusunun daha yumuşak görünmesi için */
    .card { border-radius: 15px !important; }
</style>
</head>
<body class="bg-gradient-primary">
    <div class="container">
        <div class="card o-hidden border-0 shadow-lg my-5">
            <div class="card-body p-0">
                <div class="row">
                    <div class="col-lg-5 d-none d-lg-block bg-register-image" style="background: url('https://images.unsplash.com/photo-1578301978693-85fa9c0320b9?q=80&w=500') center; background-size: cover;"></div>
                    <div class="col-lg-7">
                        <div class="p-5">
                            <div class="text-center">
                                <h1 class="h4 text-gray-900 mb-4 font-weight-bold">Sanatseverlerin Arasına Katılın!</h1>
                            </div>
                            <form class="user">
                                <div class="form-group row">
                                    <div class="col-sm-6 mb-3 mb-sm-0">
                                        <input type="text" class="form-control form-control-user" placeholder="Adınız">
                                    </div>
                                    <div class="col-sm-6">
                                        <input type="text" class="form-control form-control-user" placeholder="Soyadınız">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <input type="email" class="form-control form-control-user" placeholder="E-posta Adresi">
                                </div>
                                <div class="form-group row">
                                    <div class="col-sm-6 mb-3 mb-sm-0">
                                        <input type="password" class="form-control form-control-user" placeholder="Şifre">
                                    </div>
                                    <div class="col-sm-6">
                                        <input type="password" class="form-control form-control-user" placeholder="Şifre Tekrar">
                                    </div>
                                </div>
                                <a href="login.html" class="btn btn-primary btn-user btn-block">Hesabı Oluştur</a>
                            </form>
                            <hr>
                            <div class="text-center">
                                <a class="small text-primary" href="login.html">Zaten üye misiniz? Giriş yapın!</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
